<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" id="fig-qr-nfc-anomaly" role="img">
  <title>Physical-Digital Binding and Anomaly Detection</title>
  <desc>Diagram showing how product tags with QR and NFC codes are scanned, verified, and checked for anomalies such as geographic mismatch, temporal impossibility, duplicate patterns, and route deviation.</desc>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1A1A2E" flood-opacity="0.05"/></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/></marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2D5A27"/></marker>
    <marker id="arr-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#C4A235"/></marker>
  </defs>
  <rect width="1200" height="720" fill="#F9F7F3"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1A1A2E">Physical-Digital Binding and Anomaly Detection</text>
  <text x="600" y="76" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="15" fill="#6B7280">Scan events are validated against historical patterns to detect supply-chain anomalies</text>

  <!-- PRODUCT TAG CARD -->
  <rect x="60" y="160" width="240" height="280" rx="14" fill="#FFFFFF" stroke="#E2DDD5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="180" y="196" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#94785A" letter-spacing="1">PRODUCT TAG</text>

  <!-- QR icon -->
  <rect x="110" y="220" width="60" height="60" rx="4" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
  <rect x="116" y="226" width="18" height="18" rx="2" fill="#1A1A2E"/>
  <rect x="146" y="226" width="18" height="18" rx="2" fill="#1A1A2E"/>
  <rect x="116" y="256" width="18" height="18" rx="2" fill="#1A1A2E"/>
  <rect x="146" y="256" width="8" height="8" fill="#1A1A2E"/>
  <rect x="158" y="256" width="6" height="6" fill="#1A1A2E"/>
  <rect x="146" y="268" width="6" height="6" fill="#1A1A2E"/>
  <rect x="158" y="268" width="6" height="6" fill="#1A1A2E"/>
  <text x="140" y="300" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" fill="#4A5568">QR Code</text>

  <!-- NFC icon -->
  <g transform="translate(220, 240)">
    <circle cx="0" cy="0" r="6" fill="#1A1A2E"/>
    <path d="M 10,-14 A 18 18 0 0 1 10,14" fill="none" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 18,-22 A 28 28 0 0 1 18,22" fill="none" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 26,-30 A 38 38 0 0 1 26,30" fill="none" stroke="#1A1A2E" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="220" y="300" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" fill="#4A5568">NFC Chip</text>

  <text x="180" y="350" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" fill="#4A5568">Unique cryptographic</text>
  <text x="180" y="368" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" fill="#4A5568">identity per unit</text>

  <text x="180" y="420" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" fill="#6B7280">Tamper-evident seal</text>

  <!-- Arrow: Product Tag → Scan Event -->
  <line x1="300" y1="300" x2="388" y2="300" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- SCAN EVENT CARD -->
  <rect x="400" y="200" width="220" height="200" rx="14" fill="#FFFFFF" stroke="#E2DDD5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="510" y="236" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#94785A" letter-spacing="1">SCAN EVENT</text>
  <text x="510" y="268" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#1A1A2E">Data Captured</text>
  <text x="510" y="296" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" fill="#4A5568">• GPS coordinates</text>
  <text x="510" y="316" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" fill="#4A5568">• Timestamp (UTC)</text>
  <text x="510" y="336" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" fill="#4A5568">• Device fingerprint</text>
  <text x="510" y="356" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" fill="#4A5568">• Tag signature hash</text>

  <!-- Branch point -->
  <circle cx="700" cy="300" r="6" fill="#94A3B8"/>
  <line x1="620" y1="300" x2="694" y2="300" stroke="#94A3B8" stroke-width="2"/>

  <!-- Normal path arrow → Verified -->
  <line x1="706" y1="300" x2="700" y2="300" stroke="#94A3B8" stroke-width="2"/>
  <line x1="700" y1="300" x2="700" y2="198" stroke="#2D5A27" stroke-width="2.5"/>
  <line x1="700" y1="198" x2="788" y2="198" stroke="#2D5A27" stroke-width="2.5" marker-end="url(#arr-g)"/>

  <!-- Anomaly path arrow → Anomaly Alert -->
  <line x1="700" y1="300" x2="700" y2="440" stroke="#C4A235" stroke-width="2.5"/>
  <line x1="700" y1="440" x2="788" y2="440" stroke="#C4A235" stroke-width="2.5" marker-end="url(#arr-d)"/>

  <!-- Labels on branches -->
  <text x="730" y="240" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#2D5A27">PASS</text>
  <text x="720" y="400" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#C4A235">FLAG</text>

  <!-- VERIFIED CARD (Green) -->
  <rect x="800" y="130" width="340" height="136" rx="14" fill="#F0F5EE" stroke="#C7D7C3" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="970" y="168" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#2D5A27" letter-spacing="1">VERIFIED</text>
  <text x="970" y="196" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#1A1A2E">Provenance Confirmed</text>
  <text x="970" y="220" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" fill="#4A5568">Tag signature valid, location plausible,</text>
  <text x="970" y="240" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" fill="#4A5568">no duplicate or temporal conflict.</text>

  <!-- Checkmark icon in verified card -->
  <circle cx="840" cy="184" r="16" fill="#2D5A27" opacity="0.12"/>
  <path d="M832 184 L838 190 L850 178" fill="none" stroke="#2D5A27" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ANOMALY ALERT CARD (Gold) -->
  <rect x="800" y="350" width="340" height="260" rx="14" fill="#FBF7ED" stroke="#E3D1A4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="970" y="386" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#94785A" letter-spacing="1">ANOMALY ALERT</text>

  <!-- Warning icon -->
  <path d="M832 400 L840 386 L848 400 Z" fill="none" stroke="#C4A235" stroke-width="2" stroke-linejoin="round"/>
  <line x1="840" y1="392" x2="840" y2="396" stroke="#C4A235" stroke-width="2" stroke-linecap="round"/>
  <circle cx="840" cy="398" r="1" fill="#C4A235"/>

  <!-- Anomaly types -->
  <rect x="826" y="418" width="288" height="40" rx="8" fill="#FFFFFF" stroke="#E3D1A4" stroke-width="1"/>
  <circle cx="846" cy="438" r="8" fill="#C4A235" opacity="0.15"/>
  <text x="846" y="442" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#C4A235">1</text>
  <text x="866" y="442" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#1A1A2E">Geographic Mismatch</text>

  <rect x="826" y="466" width="288" height="40" rx="8" fill="#FFFFFF" stroke="#E3D1A4" stroke-width="1"/>
  <circle cx="846" cy="486" r="8" fill="#C4A235" opacity="0.15"/>
  <text x="846" y="490" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#C4A235">2</text>
  <text x="866" y="490" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#1A1A2E">Temporal Impossibility</text>

  <rect x="826" y="514" width="288" height="40" rx="8" fill="#FFFFFF" stroke="#E3D1A4" stroke-width="1"/>
  <circle cx="846" cy="534" r="8" fill="#C4A235" opacity="0.15"/>
  <text x="846" y="538" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#C4A235">3</text>
  <text x="866" y="538" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#1A1A2E">Duplicate Pattern</text>

  <rect x="826" y="562" width="288" height="40" rx="8" fill="#FFFFFF" stroke="#E3D1A4" stroke-width="1"/>
  <circle cx="846" cy="582" r="8" fill="#C4A235" opacity="0.15"/>
  <text x="846" y="586" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#C4A235">4</text>
  <text x="866" y="586" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#1A1A2E">Route Deviation</text>

  <!-- ALERT SCORE BAR -->
  <rect x="60" y="530" width="560" height="120" rx="14" fill="#FFFFFF" stroke="#E2DDD5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="564" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#94785A" letter-spacing="1">ALERT SCORE</text>
  <text x="90" y="586" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" fill="#4A5568">Composite anomaly confidence score</text>

  <!-- Score bar background -->
  <rect x="90" y="604" width="500" height="20" rx="10" fill="#E2DDD5"/>
  <!-- Score bar green zone -->
  <rect x="90" y="604" width="200" height="20" rx="10" fill="#2D5A27" opacity="0.25"/>
  <!-- Score bar yellow zone -->
  <rect x="290" y="604" width="150" height="20" rx="0" fill="#C4A235" opacity="0.25"/>
  <!-- Score bar red zone -->
  <rect x="440" y="604" width="150" height="20" rx="10" fill="#C4A235" opacity="0.5"/>
  <!-- Score indicator -->
  <circle cx="420" cy="614" r="8" fill="#C4A235" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Labels under bar -->
  <text x="190" y="640" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" fill="#6B7280">Low Risk</text>
  <text x="365" y="640" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" fill="#6B7280">Medium</text>
  <text x="515" y="640" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" fill="#6B7280">High Risk</text>
</svg>
