<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" id="attestation-sequence" role="img">
  <title>Attestation and Verification Sequence</title>
  <desc>Sequence diagram with four swim lanes showing the six-step flow from batch creation through hash verification.</desc>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1A1A2E" flood-opacity="0.05"/></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/></marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2D5A27"/></marker>
    <marker id="arr-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#C4A235"/></marker>
  </defs>
  <rect width="1200" height="720" fill="#F9F7F3"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1A1A2E">Attestation and Verification Sequence</text>
  <text x="600" y="66" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="15" fill="#6B7280">End-to-end flow from batch creation to independent verification</text>

  <!-- ===== SWIM LANE HEADERS ===== -->
  <!-- Lane centers: Producer=180, Certifier/Lab=460, Registry=740, Verifier=1020 -->

  <!-- Producer -->
  <rect x="100" y="92" width="160" height="46" rx="10" fill="#F0F5EE" stroke="#C7D7C3" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="180" y="120" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#2D5A27">Producer</text>

  <!-- Certifier / Lab -->
  <rect x="380" y="92" width="160" height="46" rx="10" fill="#FBF7ED" stroke="#E3D1A4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="120" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#94785A">Certifier / Lab</text>

  <!-- Registry -->
  <rect x="660" y="92" width="160" height="46" rx="10" fill="#FFFFFF" stroke="#E2DDD5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="740" y="120" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">Registry</text>

  <!-- Verifier -->
  <rect x="940" y="92" width="160" height="46" rx="10" fill="#FFFFFF" stroke="#E2DDD5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1020" y="120" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">Verifier</text>

  <!-- ===== VERTICAL LIFELINES ===== -->
  <line x1="180" y1="138" x2="180" y2="680" stroke="#E2DDD5" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="460" y1="138" x2="460" y2="680" stroke="#E2DDD5" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="740" y1="138" x2="740" y2="680" stroke="#E2DDD5" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="1020" y1="138" x2="1020" y2="680" stroke="#E2DDD5" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- ===== STEP 1: Producer creates batch ===== -->
  <!-- Self-arrow on Producer at y=195 -->
  <rect x="100" y="170" width="160" height="50" rx="8" fill="#F0F5EE" stroke="#C7D7C3" stroke-width="1"/>
  <text x="180" y="192" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#2D5A27">Create batch record</text>
  <text x="180" y="208" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" fill="#4A5568">origin, variety, volume</text>

  <!-- Step label -->
  <rect x="40" y="182" width="42" height="22" rx="11" fill="#2D5A27"/>
  <text x="61" y="197" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">1</text>

  <!-- ===== STEP 2: Upload evidence → Certifier ===== -->
  <line x1="180" y1="260" x2="460" y2="260" stroke="#2D5A27" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <rect x="244" y="240" width="172" height="22" rx="6" fill="#F0F5EE" stroke="#C7D7C3" stroke-width="1"/>
  <text x="330" y="255" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#2D5A27">Upload evidence (PDF, photo)</text>

  <rect x="40" y="249" width="42" height="22" rx="11" fill="#2D5A27"/>
  <text x="61" y="264" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">2</text>

  <!-- ===== STEP 3: Certifier signs attestation ===== -->
  <rect x="380" y="300" width="160" height="50" rx="8" fill="#FBF7ED" stroke="#E3D1A4" stroke-width="1"/>
  <text x="460" y="322" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#94785A">Sign attestation</text>
  <text x="460" y="338" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" fill="#4A5568">claim + signature + refs</text>

  <rect x="40" y="312" width="42" height="22" rx="11" fill="#C4A235"/>
  <text x="61" y="327" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">3</text>

  <!-- ===== STEP 4: Hash anchored to registry ===== -->
  <line x1="460" y1="390" x2="740" y2="390" stroke="#C4A235" stroke-width="2.5" marker-end="url(#arr-d)"/>
  <rect x="520" y="370" width="160" height="22" rx="6" fill="#FBF7ED" stroke="#E3D1A4" stroke-width="1"/>
  <text x="600" y="385" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#94785A">Anchor hash to registry</text>

  <rect x="40" y="379" width="42" height="22" rx="11" fill="#C4A235"/>
  <text x="61" y="394" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">4</text>

  <!-- Registry confirms -->
  <rect x="660" y="410" width="160" height="44" rx="8" fill="#FFFFFF" stroke="#E2DDD5" stroke-width="1"/>
  <text x="740" y="430" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#1A1A2E">Store &amp; timestamp</text>
  <text x="740" y="446" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" fill="#4A5568">immutable record</text>

  <!-- ===== STEP 5: Public verify link generated ===== -->
  <line x1="740" y1="490" x2="180" y2="490" stroke="#94A3B8" stroke-width="2" stroke-dasharray="8 4" marker-end="url(#arr)"/>
  <rect x="370" y="470" width="200" height="22" rx="6" fill="#FFFFFF" stroke="#E2DDD5" stroke-width="1"/>
  <text x="470" y="485" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#94785A">Return public verify link (QR)</text>

  <rect x="40" y="479" width="42" height="22" rx="11" fill="#94A3B8"/>
  <text x="61" y="494" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">5</text>

  <!-- ===== STEP 6: Verifier checks hash match ===== -->
  <line x1="1020" y1="560" x2="740" y2="560" stroke="#2D5A27" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <rect x="800" y="540" width="160" height="22" rx="6" fill="#F0F5EE" stroke="#C7D7C3" stroke-width="1"/>
  <text x="880" y="555" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#2D5A27">Request hash verification</text>

  <rect x="40" y="549" width="42" height="22" rx="11" fill="#2D5A27"/>
  <text x="61" y="564" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">6</text>

  <!-- Registry responds with match result -->
  <line x1="740" y1="610" x2="1020" y2="610" stroke="#2D5A27" stroke-width="2.5" stroke-dasharray="8 4" marker-end="url(#arr-g)"/>
  <rect x="800" y="590" width="160" height="22" rx="6" fill="#F0F5EE" stroke="#C7D7C3" stroke-width="1"/>
  <text x="880" y="605" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#2D5A27">Hash match confirmed ✓</text>

  <!-- Verifier result box -->
  <rect x="940" y="636" width="160" height="44" rx="8" fill="#F0F5EE" stroke="#C7D7C3" stroke-width="1.5"/>
  <text x="1020" y="656" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#2D5A27">VERIFIED</text>
  <text x="1020" y="672" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" fill="#4A5568">origin confirmed</text>
</svg>
