<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" id="georgia-export-exposure" role="img">
  <title>Georgian Wine Export Exposure (2024)</title>
  <desc>Data visualization showing Georgia's wine export volume, revenue, and top destination markets with horizontal bar chart.</desc>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1A1A2E" flood-opacity="0.05"/></filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/></marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2D5A27"/></marker>
    <marker id="arr-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#C4A235"/></marker>
  </defs>
  <rect width="1200" height="720" fill="#F9F7F3"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1A1A2E">Georgian Wine Export Exposure (2024)</text>
  <text x="600" y="76" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="15" fill="#6B7280">Scale and concentration risk in a geopolitically sensitive corridor</text>

  <!-- ===== LEFT SIDE: KEY STATISTICS ===== -->
  <text x="80" y="128" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#94785A" letter-spacing="1">KEY FIGURES</text>

  <!-- Stat Card 1: Bottles -->
  <rect x="60" y="148" width="280" height="148" rx="14" fill="#FFFFFF" stroke="#E2DDD5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="200" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#2D5A27">117M+</text>
  <text x="200" y="230" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="15" fill="#4A5568">bottles exported</text>
  <text x="200" y="252" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="12" fill="#6B7280">+5% year-over-year growth</text>

  <!-- Stat Card 2: Revenue -->
  <rect x="60" y="316" width="280" height="148" rx="14" fill="#FFFFFF" stroke="#E2DDD5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="368" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#2D5A27">$315M+</text>
  <text x="200" y="398" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="15" fill="#4A5568">total export revenue</text>
  <text x="200" y="420" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="12" fill="#6B7280">wine as a top agricultural export</text>

  <!-- Stat Card 3: Markets -->
  <rect x="60" y="484" width="280" height="148" rx="14" fill="#FFFFFF" stroke="#E2DDD5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="536" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#2D5A27">70+</text>
  <text x="200" y="566" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="15" fill="#4A5568">destination markets</text>
  <text x="200" y="588" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="12" fill="#6B7280">global geographic diversification</text>

  <!-- ===== RIGHT SIDE: TOP 5 MARKETS BAR CHART ===== -->
  <rect x="420" y="120" width="720" height="508" rx="14" fill="#FFFFFF" stroke="#E2DDD5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="160" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#94785A" letter-spacing="1">TOP 5 DESTINATION MARKETS BY VOLUME</text>

  <!-- Bar chart area: x=460..1100, y=190..570, max bar width=540 -->

  <!-- Russia - 58% -->
  <text x="460" y="218" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#1A1A2E">Russia</text>
  <rect x="560" y="200" width="432" height="30" rx="6" fill="#2D5A27" opacity="0.85"/>
  <text x="1000" y="220" text-anchor="end" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">58%</text>
  <text x="1002" y="220" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="12" fill="#6B7280"> </text>
  <rect x="560" y="234" width="432" height="1" fill="#DC4A3E" opacity="0.4"/>
  <text x="560" y="253" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="11" fill="#DC4A3E" font-weight="600">⚠ High concentration risk</text>

  <!-- Poland - 10% -->
  <text x="460" y="302" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#1A1A2E">Poland</text>
  <rect x="560" y="284" width="75" height="30" rx="6" fill="#2D5A27" opacity="0.65"/>
  <text x="644" y="304" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#1A1A2E">10%</text>

  <!-- China - 7% -->
  <text x="460" y="368" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#1A1A2E">China</text>
  <rect x="560" y="350" width="52" height="30" rx="6" fill="#2D5A27" opacity="0.55"/>
  <text x="622" y="370" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#1A1A2E">7%</text>

  <!-- Ukraine - 5% -->
  <text x="460" y="434" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#1A1A2E">Ukraine</text>
  <rect x="560" y="416" width="37" height="30" rx="6" fill="#C4A235" opacity="0.65"/>
  <text x="607" y="436" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#1A1A2E">5%</text>

  <!-- Kazakhstan - 4% -->
  <text x="460" y="500" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#1A1A2E">Kazakhstan</text>
  <rect x="560" y="482" width="30" height="30" rx="6" fill="#C4A235" opacity="0.55"/>
  <text x="600" y="502" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#1A1A2E">4%</text>

  <!-- Remaining -->
  <text x="460" y="560" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="13" fill="#6B7280" font-style="italic">Remaining 65+ markets account for ~16% of volume</text>

  <!-- Axis line -->
  <line x1="560" y1="185" x2="560" y2="525" stroke="#E2DDD5" stroke-width="1"/>

  <!-- ===== SOURCE ATTRIBUTION ===== -->
  <text x="600" y="680" text-anchor="middle" font-family="Inter, Segoe UI, Helvetica, sans-serif" font-size="12" fill="#6B7280" font-style="italic">Source: National Wine Agency of Georgia, 2025</text>
</svg>
